
defaults:
  - _self_

_target_: model_merging.model.multitask_classifier.MultiTaskImageClassifier
x_key: ${conventions.x_key}
y_key: ${conventions.y_key}
dataset_names: {eval_dataset}

image_encoder: ??
classification_heads: ??

optimizer:
  lr: 0.002         # Muon lr — 10x lower than from-scratch (preserve pretrained features)
  adamw_lr: 3e-5    # AdamW lr — conservative for heads/biases/norms
  adamw_wd: 0.01

lr_scheduler:
  _target_: torch.optim.lr_scheduler.CosineAnnealingLR
  T_max: ${train.trainer.max_epochs}
