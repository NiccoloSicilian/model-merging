core:
  project_name: dual-merging-language
  storage_dir: ${oc.env:PROJECT_ROOT}/storage
  tags: []

defaults:
  - hydra: default
  - benchmark: glue
  - merger: ta
  - override hydra/launcher: basic
  - _self_

seed_index: 0
device: cuda

# ── Model settings ───────────────────────────────────────────────────────────
nn:
  encoder:
    model_name: t5-base
    pretrained_model_id: google/flan-t5-base
    finetuned_model_id: "tanganke/flan-t5-base_glue-{task}"
    tokenizer_id: google/flan-t5-base

# ── DataLoader ───────────────────────────────────────────────────────────────
batch_size: 32

# ── Paths ────────────────────────────────────────────────────────────────────
misc:
  finetuned_accuracy_path: "${oc.env:PROJECT_ROOT}/results/finetuning/flan-t5.json"
  results_path: "${oc.env:PROJECT_ROOT}/results/${nn.encoder.model_name}/"
