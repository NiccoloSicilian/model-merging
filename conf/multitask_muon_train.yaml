core:
  project_name: dual-merging
  storage_dir: ${oc.env:PROJECT_ROOT}/storage
  entity: siciliano-1958541
  version: 0.0.1
  tags:
    - finetune
    - multitask_from_scratch

defaults:
  - hydra: default
  - nn: multitask_train
  - train: multitask
  - benchmark: N8 
  - override hydra/launcher: basic
  - _self_ # as last argument to allow the override of parameters via this main config
# Add this to the bottom of your main config file
dataset:
  ft_epochs: 10  # Set this to your desired number of epochs
seed_index: 0
device: cuda

conventions:
  x_key: 'x'
  y_key: 'y'

misc:
  save_pretrained: false
  ckpt_path: ${oc.env:PROJECT_ROOT}/checkpoints/${nn.encoder.model_name}
  pretrained_checkpoint: ${misc.ckpt_path}/zeroshot.pt
  openclip_cachedir: "${oc.env:PROJECT_ROOT}/checkpoints/openclip_cache"
  svd_path: ${oc.env:PROJECT_ROOT}/checkpoints
