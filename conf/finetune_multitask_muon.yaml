core:
  project_name: dual-merging
  storage_dir: ${oc.env:PROJECT_ROOT}/storage
  entity: siciliano-1958541
  version: 0.0.1
  tags:
    - finetune
    - multitask_muon_finetune

defaults:
  - hydra: default
  - nn: multitask_train
  - train: multitask
  - benchmark: N8
  - override hydra/launcher: basic
  - override nn/module: multitask_finetune
  - _self_

seed_index: 0
device: cuda

conventions:
  x_key: 'x'
  y_key: 'y'

misc:
  save_pretrained: false
  ckpt_path: ${oc.env:PROJECT_ROOT}/checkpoints/${nn.encoder.model_name}
  pretrained_checkpoint: ${misc.ckpt_path}/zeroshot.pt
  openclip_cachedir: "${oc.env:PROJECT_ROOT}/checkpoints/openclip_cache"
  svd_path: ${oc.env:PROJECT_ROOT}/checkpoints
  output_dir: ${oc.env:PROJECT_ROOT}/outputs  # override this on Kaggle: misc.output_dir=/kaggle/working

dataset:
  ft_epochs: 5  # fewer epochs — pretrained weights converge faster

# Finetuning-specific trainer overrides
train:
  trainer:
    gradient_clip_val: 1.0      # tighter clipping to avoid destroying pretrained features
    accumulate_grad_batches: 1  # no accumulation needed — LR is already conservative
